name: build

on:
  push:
    branches: [main]
    paths-ignore:
      # Do NOT run tests when only documentation has changed
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      # Do NOT run tests when only documentation has changed
      - "**.md"

jobs:
  tests:
    name: ${{ matrix.lisp }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Each combination of lisp and os are tested
      matrix:
        lisp: [sbcl-bin, ccl-bin]
        os: [ubuntu-latest, macOS-latest]
        exclude:
          - lisp: ccl-bin
            os: macOS-latest

    steps:
      - uses: actions/checkout@v1
      - name: Install Roswell
        env:
          LISP: ${{ matrix.lisp }}
        shell: bash
        run: curl -L https://raw.githubusercontent.com/roswell/roswell/master/scripts/install-for-ci.sh | sh
      - name: Run project checks
        shell: bash
        run: src/check.sh
      - name: Check warning log
        if: always()
        id: warnings
        shell: bash
        run: |
          if [[ -s warnings.log ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Print warnings after failure
        if: failure() && steps.warnings.outputs.present == 'true'
        shell: bash
        run: cat warnings.log
      - name: Upload warnings
        if: always() && steps.warnings.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: warnings-${{ matrix.lisp }}-${{ matrix.os }}
          path: warnings.log
          retention-days: 7
